<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RackTrack | Forgot Password</title>

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/auth.css" />
</head>

<body class="theme-staff">

  <button class="back-btn" onclick="window.location.href='staff-login.html'">
    <svg viewBox="0 0 24 24"><path d="M15 18L9 12L15 6"/></svg>
  </button>

  <div class="bg"></div>
  <div class="bgGlow"></div>

  <main class="screen">
    <section class="glassFrame staffFrame">

      <div class="loginCard">
        <h2 class="loginTitle">Forgot Password</h2>
        <p class="loginSub">Reset your password below.</p>

        <form class="form" id="forgotForm">
          <label class="label">Email or Username</label>
          <input class="input" id="identifier" type="text" required />

          <label class="label">New Password</label>
          <input class="input" id="newPassword" type="password" required />

          <label class="label">Confirm Password</label>
          <input class="input" id="confirmNewPassword" type="password" required />

          <p class="formMsg" id="forgotMsg"></p>

          <button class="btn wide gradBlue" type="submit">
            Reset Password
          </button>

          <p class="bottomText">
            <a class="link" href="staff-login.html">Back to Login</a>
          </p>
        </form>
      </div>

      <div class="infoPanel">
        <img class="brandLogo" src="../assets/images/logo.png" />
        <p class="infoText">
          Securely reset your RackTrack account password.
        </p>
      </div>

    </section>
  </main>

<script src="../assets/js/app.js"></script>
</body>
</html>
